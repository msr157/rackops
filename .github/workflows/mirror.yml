name: Mirror to Gitea

# ─────────────────────────────────────────────
# Triggers on push to ALL branches and tags.
# GitHub is the single source of truth.
# Mirrors everything to Gitea automatically.
# Gitea URL: https://gitea.rackops.in/mayank/
# ─────────────────────────────────────────────

on:
  push:
    branches:
      - '**'         # all branches
    tags:
      - '**'         # all tags

jobs:
  mirror:
    name: Mirror → Gitea (gitea.rackops.in)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history required for complete mirror

      - name: Push mirror to Gitea
        env:
          GITEA_USER:  ${{ secrets.GITEA_USER }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          # Repository name is automatically derived — no hardcoding
          REPO_NAME="${{ github.event.repository.name }}"
          REMOTE_URL="https://${GITEA_USER}:${GITEA_TOKEN}@gitea.rackops.in/mayank/${REPO_NAME}.git"

          git remote remove gitea 2>/dev/null || true
          git remote add gitea "${REMOTE_URL}"

          # Mirror all branches, tags, and refs
          git push gitea --mirror

          echo "✅ Mirrored ${REPO_NAME} → gitea.rackops.in/mayank/${REPO_NAME}"
