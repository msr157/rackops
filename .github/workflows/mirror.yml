name: Mirror to Gitea

# ─────────────────────────────────────────────
# Triggers on push to main branch only.
# GitHub is the single source of truth.
# All changes are mirrored to Gitea after push.
# ─────────────────────────────────────────────

on:
  push:
    branches:
      - main

jobs:
  mirror:
    name: Mirror → Gitea
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # required for full mirror with all branches/tags

      - name: Configure Git identity
        run: |
          git config user.name  "GitHub Mirror Bot"
          git config user.email "bot@github-mirror.local"

      - name: Push mirror to Gitea
        env:
          GITEA_USER:  ${{ secrets.GITEA_USER }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_URL:   ${{ secrets.GITEA_URL }}    # e.g. https://gitea.yourdomain.com
          GITEA_REPO:  ${{ secrets.GITEA_REPO }}   # e.g. your-org/rackops
        run: |
          # Build authenticated remote URL
          REMOTE_URL="https://${GITEA_USER}:${GITEA_TOKEN}@${GITEA_URL#https://}/${GITEA_REPO}.git"

          # Add Gitea as a remote (replace if already exists)
          git remote remove gitea 2>/dev/null || true
          git remote add gitea "${REMOTE_URL}"

          # Mirror all refs to Gitea
          git push gitea --mirror

      - name: Confirm mirror succeeded
        run: echo "✅ Successfully mirrored to Gitea"
