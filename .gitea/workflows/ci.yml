name: CI — Lint · Test · Build · Deploy

# ─────────────────────────────────────────────────────────────────────
# Gitea Actions CI Pipeline — rackops
#
# Runs on : main  → CI + Dokploy deploy
#           qa    → CI only
#           development → CI only
# Runner  : ubuntu-latest
# Deploy  : Dokploy webhook, ONLY on main, ONLY after all steps pass
# ─────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - qa
      - development

env:
  IMAGE_NAME: rackops
  IMAGE_TAG: ${{ gitea.sha }}

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: |
          echo "📦 Verifying CI tool availability..."
          curl --version | head -1
          docker --version
          echo "✅ All tools available."

      # ── 3. Lint — required files and static content ───────────────
      - name: Lint
        run: |
          echo "🔍 Linting repository..."
          ERRORS=0

          # Verify all required files exist
          for f in Dockerfile docker-compose.yml nginx.conf src/index.html src/style.css src/app.js; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ Missing: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # HTML5 doctype must be present
          grep -q "<!DOCTYPE html>" src/index.html \
            && echo "✅ HTML5 doctype" \
            || { echo "❌ HTML5 doctype missing"; ERRORS=$((ERRORS + 1)); }

          # CSS must be non-empty
          CSS_BYTES=$(wc -c < src/style.css)
          [ "$CSS_BYTES" -gt 100 ] \
            && echo "✅ style.css (${CSS_BYTES} bytes)" \
            || { echo "❌ style.css is empty or too small"; ERRORS=$((ERRORS + 1)); }

          # JS must be non-empty
          JS_BYTES=$(wc -c < src/app.js)
          [ "$JS_BYTES" -gt 50 ] \
            && echo "✅ app.js (${JS_BYTES} bytes)" \
            || { echo "❌ app.js is empty or too small"; ERRORS=$((ERRORS + 1)); }

          [ "$ERRORS" -gt 0 ] && { echo "::error::Lint failed — $ERRORS error(s)"; exit 1; }
          echo "✅ Lint passed."

      # ── 4. Tests — structural HTML assertions ─────────────────────
      - name: Tests
        run: |
          echo "🧪 Running structural tests..."
          FAILURES=0

          grep -q "<title>" src/index.html \
            && echo "✅ <title> present" \
            || { echo "❌ <title> missing"; FAILURES=$((FAILURES + 1)); }

          grep -q "viewport" src/index.html \
            && echo "✅ viewport meta present" \
            || { echo "❌ viewport meta missing"; FAILURES=$((FAILURES + 1)); }

          grep -q "style.css" src/index.html \
            && echo "✅ style.css linked" \
            || { echo "❌ style.css not linked"; FAILURES=$((FAILURES + 1)); }

          grep -q "app.js" src/index.html \
            && echo "✅ app.js linked" \
            || { echo "❌ app.js not linked"; FAILURES=$((FAILURES + 1)); }

          grep -qi "nginx" Dockerfile \
            && echo "✅ Dockerfile references nginx" \
            || { echo "❌ Dockerfile missing nginx"; FAILURES=$((FAILURES + 1)); }

          grep -q "unless-stopped" docker-compose.yml \
            && echo "✅ restart: unless-stopped present" \
            || { echo "❌ restart policy missing"; FAILURES=$((FAILURES + 1)); }

          [ "$FAILURES" -gt 0 ] && { echo "::error::Tests failed — $FAILURES failure(s)"; exit 1; }
          echo "✅ All tests passed."

      # ── 5. Build — confirm assets are readable ────────────────────
      - name: Build
        run: |
          echo "🏗️  Confirming static assets..."
          for f in src/index.html src/style.css src/app.js; do
            echo "✅ $f — $(wc -c < "$f") bytes"
          done
          echo "✅ Build stage complete."

      # ── 6. Docker Build ───────────────────────────────────────────
      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker build \
            --tag "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --tag "${{ env.IMAGE_NAME }}:latest" \
            --file Dockerfile \
            --no-cache \
            .
          echo "✅ Built: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      # ── 7. Container validation — poll homepage with curl ─────────
      - name: Container validation
        run: |
          echo "🏥 Starting container for runtime validation..."
          CONTAINER="${{ env.IMAGE_NAME }}-ci-${{ env.IMAGE_TAG }}"

          docker run \
            --detach \
            --name "${CONTAINER}" \
            --publish 8989:80 \
            "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

          echo "⏳ Polling http://localhost:8989/ — timeout 30s..."
          SUCCESS=false
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8989/ || true)
            if [ "$CODE" = "200" ]; then
              echo "✅ HTTP 200 on attempt ${i} — application is healthy."
              SUCCESS=true
              break
            fi
            echo "  [${i}/30] HTTP ${CODE} — waiting 1s..."
            sleep 1
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Application did not respond with HTTP 200 within 30s."
            echo "── Docker logs ──────────────────────────────────────────"
            docker logs "${CONTAINER}" || true
            echo "─────────────────────────────────────────────────────────"
            docker rm -f "${CONTAINER}" || true
            exit 1
          fi

          docker rm -f "${CONTAINER}" || true

      # ── 8. Deploy to Dokploy — main branch only ───────────────────
      - name: Deploy to Dokploy
        if: gitea.ref == 'refs/heads/main'
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          echo "🚀 Deploying to Dokploy..."

          if [ -z "$DOKPLOY_WEBHOOK_URL" ]; then
            echo "::error::DOKPLOY_WEBHOOK_URL secret is not configured."
            exit 1
          fi

          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"event\":\"deploy\",\"branch\":\"main\",\"service\":\"${{ env.IMAGE_NAME }}\",\"sha\":\"${{ env.IMAGE_TAG }}\"}" \
            "${DOKPLOY_WEBHOOK_URL}")

          echo "  Dokploy → HTTP ${CODE}"
          [ "$CODE" = "200" ] || [ "$CODE" = "201" ] || [ "$CODE" = "204" ] \
            || { echo "❌ Dokploy webhook failed — HTTP ${CODE}"; exit 1; }

          echo "✅ Deployment triggered."

      # ── Skip notice for non-production branches ───────────────────
      - name: Deployment skipped
        if: gitea.ref != 'refs/heads/main'
        run: echo "ℹ️  Branch is not main — CI passed, deployment skipped."

      # ── 9. Cleanup — always runs ──────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          docker rm -f "${{ env.IMAGE_NAME }}-ci-${{ env.IMAGE_TAG }}" 2>/dev/null || true
          docker image prune -f || true
          echo "🧹 Done."
