name: CI — Lint · Test · Build · Deploy

# ─────────────────────────────────────────────
# Gitea Actions CI Pipeline — rackops
# Runs on: qa (test only) and main (test + deploy)
# Self-hosted Gitea Actions Runner required.
# Deploys to Dokploy ONLY from main, ONLY on success.
# ─────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - qa

env:
  IMAGE_NAME: rackops
  IMAGE_TAG:  ${{ gitea.sha }}

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Install Dependencies ──────────────────────────
      - name: Install dependencies
        run: |
          echo "📦 Installing CI dependencies..."
          # Install HTML validation tools if available
          which tidy && echo "✅ tidy available" || echo "⚠️  tidy not available, skipping HTML validation"
          which wget && echo "✅ wget available" || apk add wget 2>/dev/null || apt-get install -y wget 2>/dev/null || true
          echo "✅ Dependencies ready."

      # ── 3. Lint ───────────────────────────────────────────
      - name: Lint source files
        run: |
          echo "🔍 Linting source files..."

          ERRORS=0

          # Check required files exist
          REQUIRED_FILES=(
            "Dockerfile"
            "docker-compose.yml"
            "nginx.conf"
            "src/index.html"
            "src/style.css"
            "src/app.js"
          )
          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing required file: $f"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ Found: $f"
            fi
          done

          # Check HTML has required elements
          if grep -q "<!DOCTYPE html>" src/index.html; then
            echo "✅ HTML5 doctype present"
          else
            echo "❌ Missing HTML5 doctype"
            ERRORS=$((ERRORS + 1))
          fi

          # Check CSS is non-empty
          CSS_SIZE=$(wc -c < src/style.css)
          if [ "$CSS_SIZE" -gt 100 ]; then
            echo "✅ CSS file size: ${CSS_SIZE} bytes"
          else
            echo "❌ CSS file appears empty or too small"
            ERRORS=$((ERRORS + 1))
          fi

          # Check JS is non-empty
          JS_SIZE=$(wc -c < src/app.js)
          if [ "$JS_SIZE" -gt 50 ]; then
            echo "✅ JS file size: ${JS_SIZE} bytes"
          else
            echo "❌ JS file appears empty or too small"
            ERRORS=$((ERRORS + 1))
          fi

          # Check nginx.conf has server block
          if grep -q "server {" nginx.conf; then
            echo "✅ nginx.conf has server block"
          else
            echo "❌ nginx.conf missing server block"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Lint failed with $ERRORS error(s)"
            exit 1
          fi
          echo "✅ Lint passed."

      # ── 4. Tests ──────────────────────────────────────────
      - name: Run tests
        run: |
          echo "🧪 Running structural tests..."

          FAILURES=0

          # Test: index.html has <title>
          if grep -q "<title>" src/index.html; then
            echo "✅ index.html has <title>"
          else
            echo "❌ index.html missing <title>"
            FAILURES=$((FAILURES + 1))
          fi

          # Test: index.html has viewport meta
          if grep -q "viewport" src/index.html; then
            echo "✅ Viewport meta tag present"
          else
            echo "❌ Viewport meta tag missing"
            FAILURES=$((FAILURES + 1))
          fi

          # Test: index.html links style.css
          if grep -q "style.css" src/index.html; then
            echo "✅ style.css linked in index.html"
          else
            echo "❌ style.css not linked"
            FAILURES=$((FAILURES + 1))
          fi

          # Test: index.html links app.js
          if grep -q "app.js" src/index.html; then
            echo "✅ app.js linked in index.html"
          else
            echo "❌ app.js not linked"
            FAILURES=$((FAILURES + 1))
          fi

          # Test: Dockerfile uses nginx
          if grep -qi "nginx" Dockerfile; then
            echo "✅ Dockerfile uses nginx"
          else
            echo "❌ Dockerfile doesn't use nginx"
            FAILURES=$((FAILURES + 1))
          fi

          # Test: docker-compose has restart policy
          if grep -q "unless-stopped" docker-compose.yml; then
            echo "✅ restart: unless-stopped configured"
          else
            echo "❌ Missing restart: unless-stopped"
            FAILURES=$((FAILURES + 1))
          fi

          # Test: nginx.conf has /health endpoint
          if grep -q "/health" nginx.conf; then
            echo "✅ /health endpoint in nginx.conf"
          else
            echo "❌ /health endpoint missing from nginx.conf"
            FAILURES=$((FAILURES + 1))
          fi

          if [ "$FAILURES" -gt 0 ]; then
            echo "::error::Tests failed: $FAILURES failure(s)"
            exit 1
          fi
          echo "✅ All tests passed."

      # ── 5. Build (static — validate assets) ──────────────
      - name: Build
        run: |
          echo "🏗️  Building static assets..."

          # Validate all src files are readable and correct
          for f in src/index.html src/style.css src/app.js; do
            if [ -r "$f" ]; then
              SIZE=$(wc -c < "$f")
              echo "✅ $f — ${SIZE} bytes"
            else
              echo "❌ Cannot read $f"
              exit 1
            fi
          done

          echo "✅ Build complete."

      # ── 6. Docker Build ───────────────────────────────────
      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker build \
            --tag  "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --tag  "${{ env.IMAGE_NAME }}:latest" \
            --file Dockerfile \
            --no-cache \
            .
          echo "✅ Docker image built."

      # ── 7. Container Health Check ─────────────────────────
      - name: Container health check
        run: |
          echo "🏥 Running container health check..."

          CONTAINER="rackops-ci-${{ env.IMAGE_TAG }}"

          docker run \
            --detach \
            --name "${CONTAINER}" \
            --publish 8989:80 \
            "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

          echo "⏳ Waiting for nginx to start..."
          sleep 8

          HEALTH=$(wget -qO- --server-response http://localhost:8989/health 2>&1 \
            | grep "HTTP/" | awk '{print $2}' | tail -1)
          MAIN=$(wget -qO- --server-response http://localhost:8989/ 2>&1 \
            | grep "HTTP/" | awk '{print $2}' | tail -1)

          echo "  /health → HTTP ${HEALTH}"
          echo "  /       → HTTP ${MAIN}"

          docker stop  "${CONTAINER}" || true
          docker rm    "${CONTAINER}" || true

          [ "${HEALTH}" = "200" ] || { echo "❌ /health check failed"; exit 1; }
          [ "${MAIN}"   = "200" ] || { echo "❌ / check failed";       exit 1; }

          echo "✅ Health check passed."

      # ── 8. Deploy to Dokploy (main only) ─────────────────
      - name: Deploy to Dokploy
        if: gitea.ref == 'refs/heads/main'
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          echo "🚀 Deploying to Dokploy (main branch)..."

          if [ -z "$DOKPLOY_WEBHOOK_URL" ]; then
            echo "::error::DOKPLOY_WEBHOOK_URL secret is not configured."
            exit 1
          fi

          HTTP_CODE=$(wget \
            --method=POST \
            --header="Content-Type: application/json" \
            --body-data="{\"event\":\"deploy\",\"branch\":\"main\",\"service\":\"rackops\",\"sha\":\"${{ env.IMAGE_TAG }}\"}" \
            --server-response \
            --spider \
            --output-document=/dev/null \
            "${DOKPLOY_WEBHOOK_URL}" 2>&1 \
            | grep "HTTP/" | awk '{print $2}' | tail -1)

          echo "  Dokploy → HTTP ${HTTP_CODE}"

          [ "${HTTP_CODE}" = "200" ] || [ "${HTTP_CODE}" = "201" ] || [ "${HTTP_CODE}" = "204" ] \
            || { echo "❌ Dokploy webhook failed — HTTP ${HTTP_CODE}"; exit 1; }

          echo "✅ Deployed to production."

      # ── 9. Skip deploy notice (qa branch) ────────────────
      - name: Skip deployment notice
        if: gitea.ref != 'refs/heads/main'
        run: |
          echo "ℹ️  Branch is not main — deployment skipped (CI passed)."

      # ── Cleanup ───────────────────────────────────────────
      - name: Cleanup Docker images
        if: always()
        run: |
          docker image prune -f --filter "until=24h" || true
          echo "🧹 Cleanup done."
