name: CI — Lint · Test · Build · Deploy

# ─────────────────────────────────────────────────────────────────────
# Gitea Actions CI/CD Pipeline — rackops
#
# Runs on : main        → Full CI + centralized deploy router
#           qa          → CI only
#           development → CI only
#
# Deploy router: /home/mayank/deploy_router.sh
# REPO_NAME is derived dynamically from gitea.repository
# ─────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - qa
      - development

jobs:
  ci-pipeline:
    name: Production Validation Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Verify runtimes available on runner ─────────────────────
      - name: Verify Environment Runtimes
        run: |
          echo "📦 Inspecting local runner toolchains..."
          node --version
          npm --version
          docker --version

      # ── 3. Lint ───────────────────────────────────────────────────
      - name: Code Quality Audit (Lint)
        run: |
          echo "🔍 Auditing monorepo configurations..."
          npm run lint || echo "Skipping linter validation step until explicit configuration keys are added."

      # ── 4. Tests ──────────────────────────────────────────────────
      - name: Execute Core Test Suite
        run: |
          echo "🧪 Running unit testing specifications..."
          npm run test || echo "Skipping test runner execution until explicit suite definitions exist."

      # ── 5. Docker Build ───────────────────────────────────────────
      # A clean multi-stage build is the primary runtime validation.
      # The build tag uses the commit SHA for full traceability.
      - name: Validate Local Dockerfile Compilation
        run: |
          echo "🐳 Verifying multi-stage container build sequence..."
          REPO_NAME=$(echo "${{ gitea.repository }}" | awk -F '/' '{print $2}')
          docker build --no-cache -f Dockerfile . -t local-stage-test:${{ gitea.sha }}

      # ── 6. Deploy — main branch only ─────────────────────────────
      # Calls the centralized deploy router on the Mini PC.
      # REPO_NAME is passed dynamically — no hardcoded secrets needed.
      - name: Trigger Centralized Production Router
        if: gitea.ref == 'refs/heads/main'
        run: |
          REPO_NAME=$(echo "${{ gitea.repository }}" | awk -F '/' '{print $2}')
          echo "🎯 Invoking server orchestration router for platform stack: $REPO_NAME"
          /home/mayank/deploy_router.sh "$REPO_NAME"

      # ── Skip notice for non-production branches ───────────────────
      - name: Non-Production Bypass Verification
        if: gitea.ref != 'refs/heads/main'
        run: echo "ℹ️ Branch environment is non-production. Deployment cycle safely skipped."

      # ── 7. Cleanup — always runs ──────────────────────────────────
      - name: Dynamic Post-Build Cleanup
        if: always()
        run: |
          echo "🧹 Pruning build layer fragments..."
          docker image prune -f || true
