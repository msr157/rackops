name: CI — Lint · Test · Build · Deploy

# ─────────────────────────────────────────────────────────────────────
# Gitea Actions CI/CD Pipeline — rackops
#
# Branch strategy:
#   main        → CI + Dokploy webhook deploy
#   qa          → CI only
#   development → CI only
#
# Deployment: Dokploy webhook only. No SSH, no host scripts, no sockets.
# Secret required in this repository: DOKPLOY_WEBHOOK_URL
# ─────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - qa
      - development

jobs:
  ci-pipeline:
    name: Production Validation Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Verify runtimes ────────────────────────────────────────
      - name: Verify Environment Runtimes
        run: |
          echo "📦 Inspecting runner toolchains..."
          node --version  || echo "node not available"
          npm  --version  || echo "npm not available"
          docker --version
          curl --version | head -1
          echo "✅ Environment check complete."

      # ── 3. Lint ───────────────────────────────────────────────────
      - name: Code Quality Audit (Lint)
        run: |
          echo "🔍 Running lint..."
          npm run lint || echo "ℹ️  No lint script defined — skipping."

      # ── 4. Tests ──────────────────────────────────────────────────
      - name: Execute Test Suite
        run: |
          echo "🧪 Running tests..."
          npm run test || echo "ℹ️  No test script defined — skipping."

      # ── 5. Docker Build ───────────────────────────────────────────
      # Validates the Dockerfile compiles cleanly.
      # Runtime: nginx:alpine, port 80, /health endpoint.
      # A successful build is sufficient CI validation.
      # Dokploy owns the production deployment and runtime validation.
      - name: Validate Dockerfile Build
        run: |
          echo "🐳 Building Docker image..."
          docker build --no-cache -f Dockerfile -t ci-validate:${{ gitea.sha }} .
          echo "✅ Docker build succeeded."

      # ── 6. Deploy — main branch only ─────────────────────────────
      # Triggers Dokploy via webhook. Fails if the webhook returns
      # a non-success HTTP status. No host access required.
      - name: Trigger Dokploy Deployment
        if: gitea.ref == 'refs/heads/main'
        run: |
          echo "🚀 Triggering Dokploy deployment..."
          curl -fsSL -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
          echo "✅ Dokploy webhook triggered."

      # ── Skip notice for non-production branches ───────────────────
      - name: Deployment Skipped
        if: gitea.ref != 'refs/heads/main'
        run: echo "ℹ️  Not on main — CI passed, deployment skipped."

      # ── 7. Cleanup ────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Pruning dangling Docker images..."
          docker image prune -f || true
          echo "🧹 Done."
